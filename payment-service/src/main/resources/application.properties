spring.application.name=payment-service
server.port=8084

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:payment_user}
spring.datasource.password=${DB_PASSWORD:payment_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.base-url=${MERCADOPAGO_BASE_URL:https://api.mercadopago.com}
mercadopago.success-url=${MERCADOPAGO_SUCCESS_URL:http://localhost:3000/pago/exito}
mercadopago.pending-url=${MERCADOPAGO_PENDING_URL:http://localhost:3000/pago/pendiente}
mercadopago.failure-url=${MERCADOPAGO_FAILURE_URL:http://localhost:3000/pago/error}

management.endpoints.web.exposure.include=health,info
