
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - marketplace-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - marketplace-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

  postgres-order:
    image: postgres:16-alpine
    container_name: postgres-order
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

  postgres-messaging:
    image: postgres:16-alpine
    container_name: postgres-messaging
    environment:
      POSTGRES_DB: messaging_db
      POSTGRES_USER: messaging_user
      POSTGRES_PASSWORD: messaging_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_messaging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messaging_user -d messaging_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

  postgres-notification:
    image: postgres:16-alpine
    container_name: postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

  postgres-recommendation:
    image: postgres:16-alpine
    container_name: postgres-recommendation
    environment:
      POSTGRES_DB: recommendation_db
      POSTGRES_USER: recommendation_user
      POSTGRES_PASSWORD: recommendation_pass
    ports:
      - "5436:5432"
    volumes:
      - postgres_recommendation_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recommendation_user -d recommendation_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

  postgres-review:
    image: postgres:16-alpine
    container_name: postgres-review
    environment:
      POSTGRES_DB: review_db
      POSTGRES_USER: review_user
      POSTGRES_PASSWORD: review_pass
    ports:
      - "5437:5432"
    volumes:
      - postgres_review_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U review_user -d review_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

  mysql-product:
    image: mysql:8.4
    container_name: mysql-product
    environment:
      MYSQL_DATABASE: product_db
      MYSQL_USER: product_user
      MYSQL_PASSWORD: product_pass
      MYSQL_ROOT_PASSWORD: root_product
    ports:
      - "3306:3306"
    volumes:
      - mysql_product_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot_product"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

  mysql-payment:
    image: mysql:8.4
    container_name: mysql-payment
    environment:
      MYSQL_DATABASE: payment_db
      MYSQL_USER: payment_user
      MYSQL_PASSWORD: payment_pass
      MYSQL_ROOT_PASSWORD: root_payment
    ports:
      - "3307:3306"
    volumes:
      - mysql_payment_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot_payment"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
    restart: unless-stopped
    networks:
      - marketplace-net

  config-service:
    build:
      context: ./config-service
    container_name: config-service
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
    volumes:
      - ./config-repo:/app/config-repo:ro
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
    restart: unless-stopped
    networks:
      - marketplace-net

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    depends_on:
      postgres-auth:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass
      JWT_SECRET: ${JWT_SECRET}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      SECURITY_LOG_LEVEL: ${SECURITY_LOG_LEVEL:-INFO}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
    ports:
      - "8081:8081"
    restart: unless-stopped
    networks:
      - marketplace-net

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    depends_on:
      mysql-product:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      DB_URL: jdbc:mysql://mysql-product:3306/product_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: product_user
      DB_PASSWORD: product_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8082:8082"
    restart: unless-stopped
    networks:
      - marketplace-net

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    depends_on:
      postgres-order:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres-order:5432/order_db
      DB_USERNAME: order_user
      DB_PASSWORD: order_pass
      KAFKA_SERVERS: kafka:29092
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
    ports:
      - "8083:8083"
    restart: unless-stopped
    networks:
      - marketplace-net

  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    depends_on:
      mysql-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      DB_URL: jdbc:mysql://mysql-payment:3306/payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: payment_user
      DB_PASSWORD: payment_pass
      KAFKA_SERVERS: kafka:29092
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      MERCADOPAGO_SUCCESS_URL: ${MERCADOPAGO_SUCCESS_URL:-http://localhost:3000/pago/exito}
      MERCADOPAGO_PENDING_URL: ${MERCADOPAGO_PENDING_URL:-http://localhost:3000/pago/pendiente}
      MERCADOPAGO_FAILURE_URL: ${MERCADOPAGO_FAILURE_URL:-http://localhost:3000/pago/error}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
    ports:
      - "8084:8084"
    restart: unless-stopped
    networks:
      - marketplace-net

  messaging-service:
    build:
      context: ./messaging-service
    container_name: messaging-service
    depends_on:
      postgres-messaging:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres-messaging:5432/messaging_db
      DB_USERNAME: messaging_user
      DB_PASSWORD: messaging_pass
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
    ports:
      - "8085:8085"
    restart: unless-stopped
    networks:
      - marketplace-net

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    depends_on:
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres-notification:5432/notification_db
      DB_USERNAME: notification_user
      DB_PASSWORD: notification_pass
      KAFKA_SERVERS: kafka:29092
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      SECURITY_LOG_LEVEL: ${SECURITY_LOG_LEVEL:-INFO}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
    ports:
      - "8086:8086"
    restart: unless-stopped
    networks:
      - marketplace-net

  recommendation-service:
    build:
      context: ./recommendation-service
    container_name: recommendation-service
    depends_on:
      postgres-recommendation:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres-recommendation:5432/recommendation_db
      DB_USERNAME: recommendation_user
      DB_PASSWORD: recommendation_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_SERVERS: kafka:29092
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
    ports:
      - "8087:8087"
    restart: unless-stopped
    networks:
      - marketplace-net

  review-service:
    build:
      context: ./review-service
    container_name: review-service
    depends_on:
      postgres-review:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres-review:5432/review_db
      DB_USERNAME: review_user
      DB_PASSWORD: review_pass
      KAFKA_SERVERS: kafka:29092
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
    ports:
      - "8088:8088"
    restart: unless-stopped
    networks:
      - marketplace-net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    depends_on:
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
      auth-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      messaging-service:
        condition: service_started
      notification-service:
        condition: service_started
      recommendation-service:
        condition: service_started
      review-service:
        condition: service_started
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - marketplace-net

networks:
  marketplace-net:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_order_data:
  postgres_messaging_data:
  postgres_notification_data:
  postgres_recommendation_data:
  postgres_review_data:
  mysql_product_data:
  mysql_payment_data: