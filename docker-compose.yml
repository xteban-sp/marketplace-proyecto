version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - marketplace-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - marketplace-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - marketplace-net

  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

  postgres-messaging:
    image: postgres:16-alpine
    container_name: postgres-messaging
    environment:
      POSTGRES_DB: messaging_db
      POSTGRES_USER: messaging_user
      POSTGRES_PASSWORD: messaging_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_messaging_data:/var/lib/postgresql/data
    networks:
      - marketplace-net

  postgres-notification:
    image: postgres:16-alpine
    container_name: postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    networks:
      - marketplace-net

  postgres-recommendation:
    image: postgres:16-alpine
    container_name: postgres-recommendation
    environment:
      POSTGRES_DB: recommendation_db
      POSTGRES_USER: recommendation_user
      POSTGRES_PASSWORD: recommendation_pass
    ports:
      - "5436:5432"
    volumes:
      - postgres_recommendation_data:/var/lib/postgresql/data
    networks:
      - marketplace-net

  postgres-review:
    image: postgres:16-alpine
    container_name: postgres-review
    environment:
      POSTGRES_DB: review_db
      POSTGRES_USER: review_user
      POSTGRES_PASSWORD: review_pass
    ports:
      - "5437:5432"
    volumes:
      - postgres_review_data:/var/lib/postgresql/data
    networks:
      - marketplace-net

  postgres-order:
    image: postgres:16-alpine
    container_name: postgres-order
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

  mysql-product:
    image: mysql:8.4
    container_name: mysql-product
    environment:
      MYSQL_DATABASE: product_db
      MYSQL_USER: product_user
      MYSQL_PASSWORD: product_pass
      MYSQL_ROOT_PASSWORD: root_product
    ports:
      - "3306:3306"
    volumes:
      - mysql_product_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot_product"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

  mysql-payment:
    image: mysql:8.4
    container_name: mysql-payment
    environment:
      MYSQL_DATABASE: payment_db
      MYSQL_USER: payment_user
      MYSQL_PASSWORD: payment_pass
      MYSQL_ROOT_PASSWORD: root_payment
    ports:
      - "3307:3306"
    volumes:
      - mysql_payment_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot_payment"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace-net

networks:
  marketplace-net:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_order_data:
  postgres_messaging_data:
  postgres_notification_data:
  postgres_recommendation_data:
  postgres_review_data:
  mysql_product_data:
  mysql_payment_data:
