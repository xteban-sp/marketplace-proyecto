# Balanceador Nginx por delante del API Gateway.
# Usa el DNS interno de Docker (127.0.0.11) para repartir entre las
# réplicas de 'api-gateway' creadas con: docker compose up --scale api-gateway=3
#
# El truco 'set $upstream ...' + variable en proxy_pass obliga a Nginx a
# resolver el nombre en CADA petición, logrando round-robin entre réplicas.
# La cabecera X-Served-By muestra qué instancia atendió (útil para la demo).

events {}

http {
    resolver 127.0.0.11 valid=5s ipv6=off;

    log_format lb '$remote_addr -> $upstream_addr  "$request"  $status';
    access_log /var/log/nginx/access.log lb;

    server {
        listen 80;

        location / {
            set $upstream_gw api-gateway:8080;
            proxy_pass http://$upstream_gw;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Demuestra a qué réplica del gateway se enrutó cada request.
            add_header X-Served-By $upstream_addr always;
        }
    }
}
