# Promtail: recolecta los logs de TODOS los contenedores Docker y los envía a Loki.
# Usa el socket de Docker para descubrir contenedores automáticamente.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Nombre del contenedor (sin la barra inicial).
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Nombre del servicio de docker-compose → etiqueta 'service' (filtrable en Grafana).
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      # Proyecto de compose, por si tienes varios stacks.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: project
