# Prometheus: recolecta métricas de todos los microservicios vía Actuator.
# Cada servicio expone /actuator/prometheus (Micrometer).
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'spring-microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
        labels: { service: 'api-gateway' }
      - targets: ['auth-service:8081']
        labels: { service: 'auth-service' }
      - targets: ['product-service:8082']
        labels: { service: 'product-service' }
      - targets: ['order-service:8083']
        labels: { service: 'order-service' }
      - targets: ['payment-service:8084']
        labels: { service: 'payment-service' }
      - targets: ['messaging-service:8085']
        labels: { service: 'messaging-service' }
      - targets: ['notification-service:8086']
        labels: { service: 'notification-service' }
      - targets: ['recommendation-service:8087']
        labels: { service: 'recommendation-service' }
      - targets: ['review-service:8088']
        labels: { service: 'review-service' }

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
