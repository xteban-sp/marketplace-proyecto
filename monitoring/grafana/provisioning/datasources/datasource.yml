# Datasource de Grafana: Prometheus, provisionado automáticamente.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus            # UID estable (lo referencian las alertas)
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
