eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Secret JWT compartido por TODOS los microservicios (servido por el Config Server).
# auth-service firma los tokens y el resto los valida con esta misma clave.
# En produccion inyectar JWT_SECRET por variable de entorno (minimo 32 caracteres).
jwt.secret=${JWT_SECRET:clave_secreta_dev_marketplace_2026_minimo_32_chars}
jwt.expiration=${JWT_EXPIRATION:86400000}
