server.port=8080

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=product-service-products
spring.cloud.gateway.routes[1].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**

spring.cloud.gateway.routes[2].id=product-service-categories
spring.cloud.gateway.routes[2].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/categories/**

spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/payments/**

spring.cloud.gateway.routes[5].id=messaging-service
spring.cloud.gateway.routes[5].uri=lb://MESSAGING-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/messages/**

spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[7].id=recommendation-service
spring.cloud.gateway.routes[7].uri=lb://RECOMMENDATION-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/recommendations/**

spring.cloud.gateway.routes[8].id=review-service
spring.cloud.gateway.routes[8].uri=lb://REVIEW-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/reviews/**

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always