server.port=8084

spring.datasource.url=${DB_URL:jdbc:mysql://mysql-payment:3306/payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:payment_user}
spring.datasource.password=${DB_PASSWORD:payment_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.kafka.bootstrap-servers=${KAFKA_SERVERS:kafka:29092}
spring.kafka.consumer.group-id=payment-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}
mercadopago.success-url=${MERCADOPAGO_SUCCESS_URL:http://localhost:3000/pago/exito}
mercadopago.pending-url=${MERCADOPAGO_PENDING_URL:http://localhost:3000/pago/pendiente}
mercadopago.failure-url=${MERCADOPAGO_FAILURE_URL:http://localhost:3000/pago/error}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always