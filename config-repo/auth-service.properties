server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always

# Usuario ADMIN inicial (se crea al arrancar si no existe). Cambiar en produccion via env.
admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:true}
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:Admin12345!}
admin.email=${ADMIN_EMAIL:admin@marketplace.local}

# Verificacion de cuenta por correo. Si MAIL_USERNAME esta vacio, se desactiva
# la verificacion (registro funciona como antes). Para activarla, usa un Gmail
# con "contrasena de aplicacion" (requiere verificacion en 2 pasos).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.verify-base-url=${APP_VERIFY_BASE_URL:http://localhost:8080}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=auth_user
spring.datasource.password=auth_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# jwt.secret y jwt.expiration se heredan de application.properties (global)
# para que auth-service firme con la MISMA clave que validan los demas servicios.

logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.pe.edu.upeu.auth_service=${LOG_LEVEL_APP:INFO}

management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=when_authorized
management.health.circuitbreakers.enabled=true

resilience4j.circuitbreaker.instances.auth-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.auth-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.auth-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.auth-service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.auth-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.auth-service.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.timelimiter.instances.auth-service.timeoutDuration=3s
resilience4j.retry.instances.auth-service.maxAttempts=3
resilience4j.retry.instances.auth-service.waitDuration=1s
