spring.application.name=messaging-service
server.port=8085

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/messaging_db}
spring.datasource.username=${DB_USERNAME:messaging_user}
spring.datasource.password=${DB_PASSWORD:messaging_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info,circuitbreakers,circuitbreakerevents
management.health.circuitbreakers.enabled=true

resilience4j.circuitbreaker.instances.messaging-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.messaging-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.messaging-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.messaging-service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.messaging-service.permittedNumberOfCallsInHalfOpenState=3

resilience4j.retry.instances.messaging-service.maxAttempts=3
resilience4j.retry.instances.messaging-service.waitDuration=1s
resilience4j.retry.instances.messaging-service.enableExponentialBackoff=true
